url: https://rgt47.github.io/zzrenvcheck/

template:
  bootstrap: 5
  bslib:
    primary: '#0054AD'

home:
  title: zzrenvcheck
  description: >
    Validate that R package dependencies in source code are correctly
    declared in DESCRIPTION and locked in renv.lock. Available as both
    an R package and a standalone shell script.

